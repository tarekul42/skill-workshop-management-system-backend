name: CI Pipeline

on:
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run Linter
      run: bun lint

    - name: Create .env file
      run: echo "${{ secrets.ENV_FILE }}" > .env

    - name: Run Tests
      run: bun test
